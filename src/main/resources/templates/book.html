<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment | Healthcare System</title>
    <style>
        /* Modern Healthcare Theme */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 1.5rem; }
        
        #msg { 
            font-weight: bold; 
            margin-bottom: 1rem; 
            text-align: center; 
            padding: 10px;
            border-radius: 5px;
        }

        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #555; }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Fixes width issue */
            font-size: 1rem;
        }

        button {
            width: 100%;
            background: #3498db;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #2980b9; }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 1rem;
            text-decoration: none;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Book Appointment</h2>

    <div id="msg"></div>

    <form id="form">
        <div class="form-group">
            <label>Patient Name</label>
            <input name="patientName" placeholder="Full Name" required>
        </div>

        <div class="form-group">
            <label>Select Doctor</label>
            <select name="doctorName" id="doctor" required>
                <option value="">Select Doctor</option>
            </select>
        </div>

        <div class="form-group">
            <label>Appointment Time</label>
            <input type="datetime-local" name="time" required>
        </div>

        <button type="submit">Book Appointment</button>
    </form>

    <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
</div>

<script>
// Load doctors
fetch('/appointments/doctors')
.then(res => res.json())
.then(data => {
    let dropdown = document.getElementById("doctor");
    if(data.length === 0) {
        dropdown.innerHTML = '<option value="">No doctors available</option>';
    } else {
        data.forEach(d => {
            dropdown.innerHTML += `<option value="${d}">${d}</option>`;
        });
    }
})
.catch(err => console.error("Fetch Error:", err));

// Submit form
document.getElementById("form").onsubmit = function(e) {
    e.preventDefault();

    let patientName = document.querySelector("[name='patientName']").value;
    let doctorName = document.querySelector("[name='doctorName']").value;
    let time = document.querySelector("[name='time']").value;

    fetch('/appointments/book', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            patientName: patientName,
            doctorName: doctorName,
            appointmentTime: time
        })
    })
    .then(res => res.text())
    .then(msg => {
        let div = document.getElementById("msg");
        div.innerText = msg;
        div.style.display = "block";

        if (msg.includes("❌") || msg.includes("⛔")) {
            div.style.color = "#c0392b";
            div.style.background = "#f9ebea";
        } else {
            div.style.color = "#27ae60";
            div.style.background = "#e9f7ef";
            setTimeout(() => { window.location.href = "/appointments/view"; }, 1500);
        }
    });
};
</script>

</body>
</html>
