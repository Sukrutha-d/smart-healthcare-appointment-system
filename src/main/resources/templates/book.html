<!DOCTYPE html>
<html>
<head>
    <title>Book/Reschedule Appointment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; color: #1e293b; text-align: center; padding: 40px; }
        .card { background: white; padding: 32px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; max-width: 450px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; }
        .text-left { text-align: left; }
        label { font-size: 14px; font-weight: 600; color: #64748b; margin-bottom: 8px; display: block; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        .slot-btn { padding: 10px 15px; margin: 6px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s; min-width: 90px; }
        .available { background: #dcfce7; color: #166534; }
        .available:hover { background: #bbf7d0; transform: translateY(-1px); }
        .booked { background: #fee2e2; color: #991b1b; cursor: not-allowed; }
        .expired { background: #f1f5f9; color: #94a3b8; cursor: not-allowed; opacity: 0.7; }
        h2 { color: #1e3a8a; margin-bottom: 30px; }
    </style>
</head>

<body>

<h2 id="page-title">Book Appointment</h2>

<div class="card">
    <div class="form-group text-left">
        <label>Your Name</label>
        <input id="patientName" class="form-control" placeholder="Enter your full name" readonly>
    </div>

    <div class="form-group text-left">
        <label>Select Specialization</label>
        <select id="specialization" class="form-control">
            <option value="">-- Select --</option>
        </select>
    </div>

    <div class="form-group text-left">
        <label>Select Doctor</label>
        <select id="doctor" class="form-control" disabled>
            <option value="">-- Choose Specialization First --</option>
        </select>
    </div>

    <div class="form-group text-left">
        <label>Select Date</label>
        <input type="date" id="date" class="form-control">
    </div>

    <div id="slots-container" style="margin-top: 20px;">
        <p style="color: #64748b; font-size: 14px; margin-bottom: 5px;">Available Time Slots</p>
        <p style="color: #94a3b8; font-size: 11px; margin-bottom: 15px;">(Slots in the past cannot be booked)</p>
        <div id="slots"></div>
    </div>
</div>

<script>
let rescheduleId = null;

window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get('username');
    rescheduleId = urlParams.get('rescheduleId');

    if (username) {
        document.getElementById("patientName").value = username;
    }
    
    if (rescheduleId) {
        document.getElementById("page-title").innerText = "Reschedule Appointment";
        document.title = "Reschedule Appointment";
    }

    loadSpecializations();
}

function loadSpecializations() {
    fetch('/appointments/specializations')
    .then(res => res.json())
    .then(data => {
        let s = document.getElementById("specialization");
        data.forEach(spec => {
            let opt = document.createElement("option");
            opt.value = spec;
            opt.innerText = spec;
            s.appendChild(opt);
        });
    });
}

document.getElementById("specialization").onchange = function() {
    let spec = this.value;
    let d = document.getElementById("doctor");
    d.innerHTML = '<option value="">-- Select Doctor --</option>';
    
    if (!spec) {
        d.disabled = true;
        return;
    }

    fetch(`/appointments/doctors-by-specialization?specialization=${spec}`)
    .then(res => res.json())
    .then(doctors => {
        doctors.forEach(doc => {
            let opt = document.createElement("option");
            opt.value = doc.name;
            opt.innerText = doc.name;
            d.appendChild(opt);
        });
        d.disabled = false;
    });
};

function loadSlots() {
    let doctor = document.getElementById("doctor").value;
    let date = document.getElementById("date").value;
    if (!doctor || !date) return;

    fetch(`/slots/${doctor}/${date}`)
    .then(res => res.json())
    .then(slots => {
        let div = document.getElementById("slots");
        div.innerHTML = "";
        if (slots.length === 0) {
            div.innerHTML = "<p style='color: #ef4444; font-size: 14px;'>No slots available for this date</p>";
            return;
        }
        let now = new Date();
        slots.forEach(s => {
            let btn = document.createElement("button");
            
            // ✅ Handle both String and Array timestamp formats
            let slotTime = Array.isArray(s.startTime) 
                ? new Date(s.startTime[0], s.startTime[1]-1, s.startTime[2], s.startTime[3], s.startTime[4])
                : new Date(s.startTime);

            let time = slotTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            btn.innerText = time;

            if (slotTime < now) {
                btn.className = "slot-btn expired";
                btn.disabled = true;
            }
            else if (s.status === "AVAILABLE") {
                btn.className = "slot-btn available";
                btn.onclick = () => processAction(s.id);
            }
            else {
                btn.className = "slot-btn booked";
                btn.disabled = true;
            }
            div.appendChild(btn);
        });
    });
}

function processAction(slotId) {
    if (rescheduleId) {
        reschedule(slotId);
    } else {
        book(slotId);
    }
}

function book(id) {
    let name = document.getElementById("patientName").value;
    fetch('/appointments/book', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `patientName=${encodeURIComponent(name)}&slotId=${id}`
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        if (msg.includes("successfully")) {
            window.location.href = '/patient/dashboard?username=' + encodeURIComponent(name);
        } else {
            loadSlots();
        }
    });
}

function reschedule(id) {
    let name = document.getElementById("patientName").value;
    fetch('/appointments/reschedule', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `appointmentId=${rescheduleId}&slotId=${id}`
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        if (msg.includes("successfully")) {
            window.location.href = '/patient/dashboard?username=' + encodeURIComponent(name);
        } else {
            loadSlots();
        }
    });
}

document.getElementById("doctor").onchange = loadSlots;
document.getElementById("date").onchange = loadSlots;

let today = new Date().toISOString().split("T")[0];
document.getElementById("date").setAttribute("min", today);
document.getElementById("date").value = today;
</script>

</body>
</html>
