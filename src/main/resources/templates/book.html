<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
            text-align: center;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #1e3a8a;
        }

        input, select, button {
            padding: 10px;
            margin: 10px;
            width: 260px;
        }

        .slot-btn {
            padding: 10px;
            margin: 5px;
            border: none;
            cursor: pointer;
        }

        .available {
            background: green;
            color: white;
        }

        .booked {
            background: red;
            color: white;
            cursor: not-allowed;
        }

        .expired {
            background: gray;
            color: white;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

<h2>Book Appointment</h2>

<div class="card">

    <input id="patientName" placeholder="Patient Name"><br>

    <select id="doctor"></select><br>

    <input type="date" id="date"><br>

    <div id="slots"></div>

</div>

<script>

// LOAD DOCTORS
fetch('/appointments/doctors')
.then(res => res.json())
.then(data => {
    let d = document.getElementById("doctor");
    data.forEach(doc => {
        d.innerHTML += `<option value="${doc}">${doc}</option>`;
    });
});

// LOAD SLOTS
function loadSlots() {

    let doctor = document.getElementById("doctor").value;
    let date = document.getElementById("date").value;

    if (!doctor || !date) return;

    fetch(`/slots/${doctor}/${date}`)
    .then(res => res.json())
    .then(slots => {

        let div = document.getElementById("slots");
        div.innerHTML = "";

        if (slots.length === 0) {
            div.innerHTML = "<p>No slots available</p>";
            return;
        }

        let now = new Date();

        slots.forEach(s => {

            let btn = document.createElement("button");

            let slotTime = new Date(s.startTime);

            let time = slotTime.toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            });

            btn.innerText = time;

            // 🔥 EXPIRED SLOT
            if (slotTime < now) {
                btn.className = "slot-btn expired";
                btn.disabled = true;
                btn.innerText += " (Expired)";
            }

            // ✅ AVAILABLE
            else if (s.status === "AVAILABLE") {
                btn.className = "slot-btn available";
                btn.onclick = () => book(s.id);
            }

            // ❌ BOOKED
            else {
                btn.className = "slot-btn booked";
                btn.disabled = true;
            }

            div.appendChild(btn);
        });
    });
}

// BOOK
function book(id) {

    let name = document.getElementById("patientName").value;

    if (!name) {
        alert("Enter name");
        return;
    }

    fetch('/appointments/book', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `patientName=${name}&slotId=${id}`
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        loadSlots();
    });
}

// EVENTS
document.getElementById("doctor").onchange = loadSlots;
document.getElementById("date").onchange = loadSlots;

// BLOCK PAST DATE
let today = new Date().toISOString().split("T")[0];
document.getElementById("date").setAttribute("min", today);

</script>

</body>
</html>
