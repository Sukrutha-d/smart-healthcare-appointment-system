<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare Dashboard</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #0f172a;
            --bg: #f1f5f9;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard-container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            color: var(--secondary);
            font-size: 2.5rem;
            margin-bottom: 2rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .nav-card {
            background: var(--white);
            padding: 40px 20px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--secondary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .nav-card span {
            font-weight: 600;
            font-size: 1.1rem;
        }

        @media (max-width: 480px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <h1>Healthcare Dashboard</h1>
    
    <div class="menu-grid">
        <a href="/appointments/book" class="nav-card">
            <div class="icon">📅</div>
            <span>Book Appointment</span>
        </a>

        <a href="/appointments/view" class="nav-card">
            <div class="icon">📋</div>
            <span>View Appointments</span>
        </a>
    </div>
</div>

</body>
</html>
