<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Panel | Smart Healthcare</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #10b981;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #334155;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            background: var(--primary);
            color: white;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h1 {
            font-size: 20px;
            margin-bottom: 40px;
            color: var(--accent);
        }

        .nav-link {
            display: block;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-link.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        /* Main Content */
        .main-content {
            padding: 40px;
            height: 100vh;
            overflow-y: auto;
        }

        .card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 24px;
        }

        .form-grid {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
        }

        input, select {
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn {
            background: var(--accent);
            color: white;
            padding: 11px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid #f1f5f9;
            color: #64748b;
            font-size: 13px;
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-none { background: #f1f5f9; color: #64748b; }
        .badge-booked { background: #fee2e2; color: #991b1b; }
        .badge-checked { background: #e0f2fe; color: #0369a1; }
        .badge-ongoing { background: #fef3c7; color: #92400e; }
        .badge-completed { background: #dcfce7; color: #166534; }
        .badge-cancelled { background: #fee2e2; color: #991b1b; text-decoration: line-through; }

        .btn-start {
            background: #3b82f6;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .btn-cancel {
            background: #f1f5f9;
            color: #ef4444;
            padding: 6px 12px;
            border: 1px solid #fecaca;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 5px;
        }
        .btn-cancel:hover { background: #fee2e2; }

        /* Notifications */
        .notif-item { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; color: #94a3b8; }
        .notif-type { font-weight: 700; font-size: 10px; color: var(--accent); display: block; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>Doctor Panel</h1>
    <a href="#" class="nav-link active">Daily Schedule</a>
    <a href="#" class="nav-link">Patient Records</a>
    <a href="#" class="nav-link">Settings</a>
    
    <div style="margin-top: 40px; padding: 0 16px;">
        <h3 style="font-size: 11px; color: #64748b; text-transform: uppercase; margin-bottom: 10px;">Notifications</h3>
        <div id="notif-list" style="max-height: 250px; overflow-y: auto;">
            <p style="font-size: 11px; color: #64748b;">No updates.</p>
        </div>
    </div>
    <div style="margin-top: auto;">
        <a th:href="@{/login}" class="nav-link">Sign Out</a>
    </div>
</div>

<div class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 style="margin: 0;">Welcome, <span th:text="${doctorName}"></span></h2>
        <div style="display: flex; align-items: center; gap: 10px;">
            <label>View Schedule:</label>
            <input type="date" id="dateFilter" th:value="${selectedDate}" style="padding: 6px;">
        </div>
    </div>

    <!-- ⚡ MANAGE AVAILABILITY -->
    <div class="card" th:if="${!slotsExist}">
        <h3 style="margin-top: 0; color: #059669; font-size: 18px;">Set Availability Slots</h3>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Generate 15-minute booking slots for a specific window.</p>
        
        <form th:action="@{/doctor/generate-slots}" method="POST" class="form-grid">
            <input type="hidden" name="username" th:value="${doctorName}">
            <div class="form-group">
                <label>Target Date</label>
                <input type="date" name="date" th:value="${selectedDate}" required>
            </div>
            <div class="form-group">
                <label>Start Time</label>
                <input type="time" name="startTime" id="defaultStartTime" required>
            </div>
            <div class="form-group">
                <label>End Time</label>
                <input type="time" name="endTime" id="defaultEndTime" required>
            </div>
            <button type="submit" class="btn">Generate Slots</button>
        </form>
    </div>

    <script>
        // Set sensible defaults for timing (current hour + 1)
        const now = new Date();
        const hour = now.getHours();
        const startStr = (hour + 1).toString().padStart(2, '0') + ':00';
        const endStr = (hour + 4).toString().padStart(2, '0') + ':00';
        document.getElementById('defaultStartTime').value = startStr;
        document.getElementById('defaultEndTime').value = endStr;
    </script>

    <!-- 📋 SCHEDULE TABLE -->
    <div class="card">
        <h3 style="margin-top: 0; margin-bottom: 20px;" th:text="'Daily Appointments for ' + ${selectedDate}">Daily Appointments</h3>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Patient Name</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="slot : ${slots}">
                    <td style="font-weight: 600;" th:text="${#temporals.format(slot.startTime, 'HH:mm')}"></td>
                    <td>
                        <span th:text="${slot.patientName != null ? slot.patientName : 'No Patient'}" 
                              th:style="${slot.patientName != null ? 'font-weight: 600;' : 'color: #94a3b8; font-style: italic;'}"></span>
                    </td>
                    <td>
                        <!-- Unified Status Display -->
                        <span th:if="${slot.status.name() == 'AVAILABLE'}" class="badge badge-none">No Appointment</span>
                        
                        <span th:if="${slot.status.name() == 'BOOKED'}" 
                              th:class="'badge ' + ${slot.appointmentStatus != null ? 'badge-' + slot.appointmentStatus.name().toLowerCase().replace('_', '-') : 'badge-booked'}"
                              th:text="${slot.appointmentStatus != null ? slot.appointmentStatus : 'BOOKED'}">
                        </span>
                    </td>
                    <td>
                        <!-- Start / Resume Consultation -->
                        <a th:if="${slot.appointmentStatus != null && slot.appointmentStatus.name() != 'COMPLETED' && slot.appointmentStatus.name() != 'CANCELLED'}" 
                           th:href="@{/consultation/startBySlot/{id}(id=${slot.id})}" 
                           th:class="${slot.appointmentStatus.name() == 'CHECKED_IN' or slot.appointmentStatus.name() == 'ONGOING'} ? 'btn-start' : 'btn-start disabled'"
                           th:style="${slot.appointmentStatus.name() == 'CHECKED_IN' or slot.appointmentStatus.name() == 'ONGOING'} ? '' : 'background: #cbd5e1; cursor: not-allowed;'"
                           th:title="${slot.appointmentStatus.name() == 'CHECKED_IN' or slot.appointmentStatus.name() == 'ONGOING'} ? 'Proceed to consultation' : 'Pending patient check-in at front desk'">
                           <span th:text="${slot.appointmentStatus.name() == 'ONGOING'} ? 'Resume' : 'Start'"></span>
                        </a>

                        <!-- Cancel Slot -->
                        <form th:action="@{/doctor/cancel-slot/{id}(id=${slot.id})}" method="POST" style="display:inline;" onsubmit="return confirm('Cancel this slot? If a patient is booked, they will be notified.')">
                            <input type="hidden" name="username" th:value="${doctorName}">
                            <input type="hidden" name="date" th:value="${selectedDate}">
                            <button type="submit" class="btn-cancel">Remove</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(slots)}">
                    <td colspan="4" style="text-align: center; color: #64748b; padding: 40px;">
                        No slots generated for this date.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    document.getElementById("dateFilter").onchange = function() {
        let date = this.value;
        let username = "[[${doctorName}]]";
        window.location.href = `/doctor/dashboard?username=${username}&date=${date}`;
    };

    let today = new Date().toISOString().split("T")[0];
    document.querySelectorAll('input[type="date"]').forEach(el => el.setAttribute("min", today));

    function loadNotifications() {
        let username = "[[${doctorName}]]";
        fetch(`/api/notifications/${username}`)
        .then(res => res.json())
        .then(data => {
            if(data.length > 0) {
                let html = "";
                data.slice(0, 5).forEach(n => {
                    html += `<div class="notif-item"><span class="notif-type">${n.type}</span>${n.message}</div>`;
                });
                document.getElementById("notif-list").innerHTML = html;
            }
        });
    }
    loadNotifications();
</script>

</body>
</html>
