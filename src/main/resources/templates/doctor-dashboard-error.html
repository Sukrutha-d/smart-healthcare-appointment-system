<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Error | Smart Healthcare</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f8fafc; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        h2 { color: #ef4444; margin-top: 0; }
        p { color: #64748b; line-height: 1.6; }
        .btn { display: inline-block; margin-top: 20px; background: #3b82f6; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Consultation Blocked</h2>
        <p th:text="${error}"></p>
        <a th:href="@{/doctor/dashboard(username=${doctorName})}" class="btn">Return to Dashboard</a>
    </div>
</body>
</html>
