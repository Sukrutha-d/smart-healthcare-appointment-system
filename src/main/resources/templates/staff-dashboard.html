<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard | Smart Healthcare</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px;
        }

        .header-panel {
            background: linear-gradient(135deg, var(--primary) 0%, #6d28d9 100%);
            color: white;
            padding: 24px 32px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease-out;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 24px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 24px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 10px;
        }

        th {
            background: #f1f5f9;
            color: var(--text-muted);
            font-weight: 600;
            text-align: left;
            padding: 12px 16px;
            font-size: 13px;
            text-transform: uppercase;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.BOOKED { background: #e0e7ff; color: #4338ca; }
        .badge.CHECKED_IN { background: #fef08a; color: #854d0e; }
        .badge.ONGOING { background: #fed7aa; color: #9a3412; }
        .badge.COMPLETED { background: #dcfce7; color: #166534; }
        .badge.CANCELLED { background: #fee2e2; color: #991b1b; }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: rgba(139, 92, 246, 0.05);
        }

        /* Notifications */
        .notif-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .notif-item { padding: 12px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .notif-item:last-child { border-bottom: none; }
        .notif-type { font-weight: 700; font-size: 10px; color: var(--primary); text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header-panel">
    <div>
        <h1 style="margin: 0; font-size: 24px;">Hospital Front Desk (Staff Window)</h1>
        <p style="margin: 4px 0 0 0; opacity: 0.9;" th:text="${'Operator: ' + staff.name + ' - ' + staff.department}"></p>
    </div>
    <a th:href="@{/login}" style="color: white; text-decoration: none; font-size: 14px; opacity: 0.9;">Logout</a>
</div>

<div class="layout">
    <div class="card">
        <h2 style="margin-top: 0;">Today's Appointments Queue</h2>
        
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Patient</th>
                    <th>Doctor</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="app : ${appointments}">
                    <td th:text="${#temporals.format(app.appointmentTime, 'HH:mm - dd MMM')}"></td>
                    <td th:text="${app.patientName}" style="font-weight: 500;"></td>
                    <td th:text="${app.doctorName}"></td>
                    <td>
                        <span th:class="'badge ' + ${app.status != null ? app.status.name() : 'BOOKED'}" 
                              th:text="${app.status != null ? app.status.name() : 'BOOKED'}"></span>
                    </td>
                    <td>
                        <form th:if="${app.status != null and app.status.name() == 'BOOKED'}" 
                              th:action="@{/staff/checkin/{id}(id=${app.id})}" method="POST" style="display:inline;">
                            <input type="hidden" name="username" th:value="${staff.name}">
                            <button type="submit" class="btn btn-outline" style="min-width: 90px;">Check In</button>
                        </form>

                        <form th:if="${app.status != null and app.status.name() == 'COMPLETED' and app.billId == null}" 
                              th:action="@{/staff/generate-bill/{id}(id=${app.id})}" method="POST" style="display:inline;">
                            <input type="hidden" name="username" th:value="${staff.name}">
                            <button type="submit" class="btn" style="min-width: 90px;">Generate Bill</button>
                        </form>

                        <a th:if="${app.billId != null}" 
                           th:href="@{/staff/invoice/{id}(id=${app.billId}, username=${staff.name})}" 
                           class="btn btn-outline" style="min-width: 90px; text-align:center;">View Bill</a>
                    </td>
                </tr>
                <tr th:if="${appointments.empty}">
                    <td colspan="5" style="text-align: center; color: var(--text-muted); padding: 40px;">No appointments found.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="notif-card">
        <h3 style="margin-top: 0; font-size: 16px;">Updates</h3>
        <div id="notif-list">
            <p style="font-size: 13px; color: var(--text-muted);">No recent updates.</p>
        </div>
    </div>
</div>

<script>
    function loadNotifications() {
        let username = "[[${staff.name}]]";
        fetch(`/api/notifications/${username}`)
        .then(res => res.json())
        .then(data => {
            if(data.length > 0) {
                let html = "";
                data.slice(0, 8).forEach(n => {
                    html += `<div class="notif-item"><span class="notif-type">${n.type}</span><div style="margin-top:2px;">${n.message}</div></div>`;
                });
                document.getElementById("notif-list").innerHTML = html;
            }
        });
    }
    window.onload = loadNotifications;
</script>

</body>
</html>
